<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilha MultCap Financeira Pro</title>
    <!-- Biblioteca de Gráficos de alta performance -->
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --cor-fundo: #0f172a;
            --cor-card: #1e293b;
            --cor-texto: #f8fafc;
            --cor-texto-mutado: #94a3b8;
            --cor-primaria: #00b4d8;
            --cor-sucesso: #10b981;
            --cor-perigo: #ef4444;
            --border-padrao: 1px solid #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--cor-fundo);
            color: var(--cor-texto);
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--cor-primaria);
            font-size: 28px;
        }

        header p {
            color: var(--cor-texto-mutado);
            font-size: 14px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--cor-card);
            padding: 20px;
            border-radius: 8px;
            border: var(--border-padrao);
        }

        .card h3 {
            font-size: 14px;
            color: var(--cor-texto-mutado);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card .valor {
            font-size: 24px;
            font-weight: bold;
        }

        .card.receitas .valor { color: var(--cor-sucesso); }
        .card.despesas .valor { color: var(--cor-perigo); }
        .card.saldo .valor { color: var(--cor-primaria); }

        /* Área de Gráficos */
        .graficos-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .graficos-container { grid-template-columns: 1fr; }
        }

        .conteudo {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .conteudo { grid-template-columns: 1fr; }
        }

        .bloco {
            background-color: var(--cor-card);
            padding: 20px;
            border-radius: 8px;
            border: var(--border-padrao);
            height: fit-content;
        }

        .bloco h2 {
            font-size: 18px;
            margin-bottom: 20px;
            border-bottom: var(--border-padrao);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 5px;
            color: var(--cor-texto-mutado);
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            background-color: var(--cor-fundo);
            border: var(--border-padrao);
            border-radius: 6px;
            color: var(--cor-texto);
            font-size: 14px;
        }

        .btn-salvar {
            width: 100%;
            padding: 12px;
            background-color: var(--cor-primaria);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-salvar:hover { background-color: #0077b6; }

        .tabela-container { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 12px;
            border-bottom: var(--border-padrao);
            font-size: 14px;
        }

        th { color: var(--cor-texto-mutado); font-weight: 600; }
        .tipo-entrada { color: var(--cor-sucesso); font-weight: bold; }
        .tipo-saida { color: var(--cor-perigo); font-weight: bold; }
        .btn-deletar { background: none; border: none; cursor: pointer; }
        
        .chart-box {
            max-height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Planilha MultCap Financeira Pro</h1>
            <p>Controle inteligente com gráficos em tempo real</p>
        </header>

        <!-- Indicadores de Saldos -->
        <section class="dashboard">
            <div class="card receitas">
                <h3>Total Receitas</h3>
                <div class="valor" id="total-receitas">R$ 0,00</div>
            </div>
            <div class="card despesas">
                <h3>Total Despesas</h3>
                <div class="valor" id="total-despesas">R$ 0,00</div>
            </div>
            <div class="card saldo">
                <h3>Saldo Atual</h3>
                <div class="valor" id="saldo-atual">R$ 0,00</div>
            </div>
        </section>

        <!-- Seção Dinâmica de Gráficos -->
        <section class="graficos-container">
            <div class="bloco">
                <h2>Balanço Mensal</h2>
                <div class="chart-box">
                    <canvas id="graficoBalanco"></canvas>
                </div>
            </div>
            <div class="bloco">
                <h2>Gastos por Categoria</h2>
                <div class="chart-box">
                    <canvas id="graficoCategorias"></canvas>
                </div>
            </div>
        </section>

        <!-- Área de Interação -->
        <div class="conteudo">
            <aside class="bloco">
                <h2>Nova Transação</h2>
                <form id="finance-form">
                    <div class="form-group">
                        <label for="descricao">Descrição</label>
                        <input type="text" id="descricao" placeholder="Ex: Mercado, Luz, Salário" required>
                    </div>
                    <div class="form-group">
                        <label for="valor">Valor (R$)</label>
                        <input type="number" id="valor" step="0.01" placeholder="0,00" required>
                    </div>
                    <div class="form-group">
                        <label for="tipo">Tipo</label>
                        <select id="tipo" required>
                            <option value="entrada">Receita (+)</option>
                            <option value="saida" selected>Despesa (-)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="categoria">Categoria</label>
                        <select id="categoria" required>
                            <option value="Moradia">Moradia</option>
                            <option value="Alimentação">Alimentação</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Lazer">Lazer</option>
                            <option value="Saúde">Saúde</option>
                            <option value="Salário">Salário / Renda</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-salvar">Adicionar Registro</button>
                </form>
            </aside>

            <main class="bloco">
                <h2>Histórico de Lançamentos</h2>
                <div class="tabela-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Descrição</th>
                                <th>Categoria</th>
                                <th>Valor</th>
                                <th>Ação</th>
                            </tr>
                        </thead>
                        <tbody id="lista-transacoes"></tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <script>
        let transacoes = JSON.parse(localStorage.getItem('multcap_pro_transacoes')) || [];
        
        const form = document.getElementById('finance-form');
        const listaTransacoes = document.getElementById('lista-transacoes');
        const txtReceitas = document.getElementById('total-receitas');
        const txtDespesas = document.getElementById('total-despesas');
        const txtSaldo = document.getElementById('saldo-atual');

        let chartBalanco;
        let chartCategorias;

        function inicializarGraficos() {
            const ctxBalanco = document.getElementById('graficoBalanco').getContext('2d');
            chartBalanco = new Chart(ctxBalanco, {
                type: 'bar',
                data: {
                    labels: ['Receitas', 'Despesas'],
                    datasets: [{
                        data:,
                        backgroundColor: ['#10b981', '#ef4444']
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
            });

            const ctxCategorias = document.getElementById('graficoCategorias').getContext('2d');
            chartCategorias = new Chart(ctxCategorias, {
                type: 'doughnut',
                data: {
